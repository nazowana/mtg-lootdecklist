const SUPABASE_URL = "https://cpvpowzwahhuxbhgqdtq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdnBvd3p3YWhodXhiaGdxZHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDM2MzcsImV4cCI6MjA4ODM3OTYzN30.GCdIXNCzWCWFLvjFwCLvJ4zAAd2qur6l7jP0lA5Oco0";
const STORAGE_TABLE = "mtg_vault"; // Supabaseのテーブル名

// ── ストレージ抽象化 ──
// Supabase未設定時はlocalStorageにフォールバック
async function remoteGet(key) {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${STORAGE_TABLE}?key=eq.${key}&select=value`, {
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
  });
  const rows = await res.json();
  return rows.length ? JSON.parse(rows[0].value) : null;
}

async function remoteSet(key, value) {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    localStorage.setItem(key, JSON.stringify(value));
    return;
  }
  await fetch(`${SUPABASE_URL}/rest/v1/${STORAGE_TABLE}`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
      Prefer: "resolution=merge-duplicates",
    },
    body: JSON.stringify({ key, value: JSON.stringify(value) }),
  });
}
</script>

const _apiCache = new Map();
function cardById(id) { return COMMANDERS.find(c => c.id === id) || _apiCache.get(id); }

// ── 画像URL ──
function imgUrl(id, size="normal") {
  return `https://cards.scryfall.io/${size}/front/${id[0]}/${id[1]}/${id}.jpg`;
}

// ── 日本語画像UUID 遅延取得（localStorageキャッシュ付き） ──
const _JA_LS = "mtg-ja-img-v2";
const _jaCache = (() => {
  const m = new Map();
  try { Object.entries(JSON.parse(localStorage.getItem(_JA_LS)||"{}")).forEach(([k,v])=>m.set(k,v)); } catch(e){}
  return m;
})();
const _jaQueue = []; // {id, name, cbs:[resolve...]}
let _jaTimer = null;
function _saveJa(id, val) {
  _jaCache.set(id, val);
  try { const s=JSON.parse(localStorage.getItem(_JA_LS)||"{}"); s[id]=val; localStorage.setItem(_JA_LS,JSON.stringify(s)); } catch(e){}
}
function _runJaQueue() {
  if (!_jaQueue.length) { _jaTimer=null; return; }
  const item = _jaQueue[0];
  if (_jaCache.has(item.id)) {
    _jaQueue.shift(); item.cbs.forEach(cb=>cb(_jaCache.get(item.id)));
    _jaTimer = setTimeout(_runJaQueue, 0); return;
  }
  const url = `https://api.scryfall.com/cards/search?q=${encodeURIComponent(`!"${item.name}" lang:ja`)}&order=released&dir=desc&unique=prints`;
  fetch(url)
    .then(r=>r.ok?r.json():null)
    .then(d=>{ const v=d?.data?.[0]?.id||false; _saveJa(item.id,v); _jaQueue.shift(); item.cbs.forEach(cb=>cb(v)); })
    .catch(()=>{ _saveJa(item.id,false); _jaQueue.shift(); item.cbs.forEach(cb=>cb(false)); })
    .finally(()=>{ _jaTimer=setTimeout(_runJaQueue, 120); });
}
function fetchJaId(id, name) {
  if (_jaCache.has(id)) return Promise.resolve(_jaCache.get(id));
  return new Promise(resolve => {
    const ex = _jaQueue.find(q=>q.id===id);
    if (ex) { ex.cbs.push(resolve); return; }
    _jaQueue.push({id, name, cbs:[resolve]});
    if (!_jaTimer) _runJaQueue();
  });
}

  .detail-name{font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:#d8d0c0;letter-spacing:.04em;line-height:1.4;text-align:center;}
  .detail-jp{font-family:'Noto Sans JP',sans-serif;font-size:13px;color:#7a9a7a;text-align:center;}

  .detail-pips{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;}

  /* HINT / NO RESULT */
  .hint{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:14px;}
  .hint-icon{font-size:40px;opacity:.08;}
  .hint-txt{font-family:'Cinzel',serif;font-size:12px;color:var(--dim);letter-spacing:.1em;text-align:center;line-height:2.3;}
  .hint-num{display:inline-block;background:rgba(197,165,87,.06);border:1px solid rgba(197,165,87,.13);border-radius:3px;padding:1px 10px;font-size:10px;color:rgba(197,165,87,.4);}
  .no-result{text-align:center;padding:60px;font-family:'Cinzel',serif;font-size:12px;color:var(--dim);letter-spacing:.08em;}

  /* PLAYERS */
  .players-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
  .players-toolbar{background:var(--bg2);border-bottom:1px solid var(--line);padding:0 24px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .players-toolbar h2{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:#d8d0c0;letter-spacing:.1em;}
  .btn{background:none;border:1px solid var(--ln2);border-radius:4px;padding:5px 14px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mut);cursor:pointer;letter-spacing:.08em;transition:all .15s;white-space:nowrap;}
  .btn:hover{border-color:var(--gold);color:var(--gold);}
  .btn.primary{border-color:var(--gold);color:var(--gold);background:rgba(197,165,87,.07);}
  .btn.active{background:rgba(197,165,87,.12);color:var(--gold);border-color:var(--gold);}
  .btn.danger{border-color:#c06060;color:#c06060;}
  .btn.danger:hover{background:rgba(192,96,96,.1);}
  .players-scroll{flex:1;overflow-y:auto;}
  .players-scroll::-webkit-scrollbar{width:5px;}
  .players-scroll::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:3px;}
  .player-row{display:flex;align-items:stretch;border-bottom:1px solid var(--line);min-height:130px;}
  .player-row:last-child{border-bottom:none;}

  .decks-strip{flex:1;display:flex;align-items:center;gap:10px;padding:14px 16px;overflow-x:auto;}

  .deck-img{width:72px;height:100px;border-radius:6px;object-fit:cover;object-position:top;display:block;box-shadow:0 4px 12px rgba(0,0,0,.5);}
  .deck-img-ph{width:72px;height:100px;border-radius:6px;background:var(--bg3);border:1px solid var(--ln2);display:flex;align-items:center;justify-content:center;color:var(--dim);}
  .deck-rm{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:#0a0c0e;border:1px solid #c06060;border-radius:50%;color:#c06060;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;z-index:2;}
  .deck-wrap:hover .deck-rm{opacity:1;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;}
  .modal{background:var(--bg2);border:1px solid var(--ln2);border-radius:8px;padding:28px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:18px;}
  .modal h3{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:#d8d0c0;letter-spacing:.08em;}
  .modal-label{font-size:10px;color:var(--mut);letter-spacing:.12em;margin-bottom:6px;}
  .modal-input{background:var(--bg3);border:1px solid var(--ln2);border-radius:4px;padding:9px 12px;color:var(--txt);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;width:100%;transition:border-color .2s;}
  .modal-input:focus{border-color:var(--gold);}
  .modal-input::placeholder{color:var(--dim);}
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
  .swatch:hover{transform:scale(1.15);}
  .swatch.on{border-color:#fff;box-shadow:0 0 6px currentColor;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--gold);border-radius:6px;padding:8px 20px;font-size:11px;color:var(--gold);letter-spacing:.06em;z-index:999;pointer-events:none;animation:fadeup .25s ease;}

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    /* Topbar: 2行レイアウト */
    .topbar{flex-wrap:wrap;height:auto;padding:8px 12px 0;}
    .logo{font-size:11px;margin-right:auto;}
    .logo small{display:none;}
    .main-tabs{order:9;width:calc(100% + 24px);margin:6px -12px 0;border-top:1px solid var(--line);height:38px;}
    .main-tab{flex:1;padding:0 4px;font-size:9px;letter-spacing:.03em;}
    .spacer{display:none;}

    /* 検索ヘッダー */
    .search-header{height:auto;padding:10px 12px;flex-wrap:wrap;gap:8px;}
    .s-wrap{max-width:100%;}
    .mode-toggle{width:100%;}
    .mode-btn{flex:1;text-align:center;}

    /* カードグリッド */
    .grid-pane{padding:0 10px 24px;}
    .card-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}

    /* DetailPane: 全画面オーバーレイ */
    .detail-pane{position:fixed;inset:0;width:100%!important;min-width:0!important;z-index:300;border-left:none;}
    .detail-pane.hidden{display:none;}

    /* プレイヤー行 */
    .players-toolbar{height:auto;min-height:48px;flex-wrap:wrap;padding:8px 12px;gap:8px;}
    .player-info{width:80px;min-width:80px;padding:10px 8px;}
    .player-avatar{width:24px;height:24px;font-size:10px;}
    .player-name-txt{font-size:10px;}
    .player-deck-count{font-size:9px;}
    .decks-strip{padding:10px 8px;gap:8px;}
    .deck-img{width:56px;height:78px;}
    .deck-img-ph{width:56px;height:78px;}
    .deck-name{width:56px;}
  }
`;

// ── 画像コンポーネント（ブラウザ環境では直接URLが使える）──
function CardImg({ id, name, size="normal", className, style }) {
  const [err, setErr] = useState(false);
  const [displayId, setDisplayId] = useState(() => _jaCache.get(id) || id);
  useEffect(() => {
    setErr(false);
    const cached = _jaCache.get(id);
    if (cached !== undefined) { setDisplayId(cached || id); return; }
    setDisplayId(id);
    if (!name) return;
    fetchJaId(id, name).then(jaId => setDisplayId(jaId || id));
  }, [id, name]);
  if (err) return <div className={className} style={{ display:"flex",alignItems:"center",justifyContent:"center",color:"var(--dim)",fontSize:22,...style }}>⬡</div>;
  return <img src={imgUrl(displayId, size)} alt="" className={className} style={style}
    onError={() => setErr(true)} />;
}

// ── カードタイル ──
function CardTile({ card, selected, onClick }) {
  return (
    <div className={`card-tile${selected?" selected":""}`} onClick={onClick}>
      <div className="tile-frame">
        <CardImg id={card.id} name={card.n} size="normal" style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"top" }} />
      </div>
      <div className="tile-name-en">{card.n}</div>
      {card.j && <div className="tile-name-jp">{card.j}</div>}
    </div>
  );
}

// ── 詳細パネル ──
function DetailPane({ card, players, onAddDeck, onAddWant, onClose }) {
  if (!card) return <div className="detail-pane hidden" />;
  return (
    <div className="detail-pane">
      <div className="detail-inner">
        <button className="detail-close" onClick={onClose}>✕ 閉じる</button>
        <CardImg id={card.id} name={card.n} size="normal" className="detail-img" />
        <div className="detail-name">{card.n}</div>
        {card.j && <div className="detail-jp">{card.j}</div>}
        <div className="detail-type">{card.t}</div>
        {card.ci.length > 0 && (
          <div className="detail-pips">
            {card.ci.filter(c => COLOR_BG[c]).map(c => (
              <div key={c} className="detail-pip" style={{ background:COLOR_BG[c] }} title={COLOR_LBL[c]}>{c}</div>
            ))}
          </div>
        )}
        {card.p != null && <div className="detail-type">{card.p} / {card.th}</div>}
        {players.length > 0 ? (
          <div className="reg-cols">
            <div className="reg-col">
              <div className="section-label">統率者デッキ</div>
              {players.map(p => {
                const has = p.decks.includes(card.id);
                return (
                  <button key={p.id}
                    className={`player-reg-btn${has?" has":""}`}
                    style={{ borderColor:p.color, color:p.color, background:has?`${p.color}15`:"none" }}
                    onClick={() => !has && onAddDeck(p.id, card.id, p.name)}>
                    <span style={{ fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</span>
                    <span style={{ fontSize:9, opacity:.8, flexShrink:0 }}>{has ? "✓" : "＋"}</span>
                  </button>
                );
              })}
            </div>
            <div className="reg-col">
              <div className="section-label">欲しいカード</div>
              {players.map(p => {
                const has = (p.wants||[]).includes(card.id);
                return (
                  <button key={p.id}
                    className={`player-reg-btn${has?" has":""}`}
                    style={{ borderColor:p.color, color:p.color, background:has?`${p.color}15`:"none" }}
                    onClick={() => !has && onAddWant(p.id, card.id, p.name)}>
                    <span style={{ fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</span>
                    <span style={{ fontSize:9, opacity:.8, flexShrink:0 }}>{has ? "✓" : "＋"}</span>
                  </button>
                );
              })}
            </div>
          </div>
        ) : (
          <div style={{ fontSize:10, color:"var(--dim)", textAlign:"center", lineHeight:1.8 }}>
            「統率者デッキ」タブでプレイヤーを<br />追加するとデッキ登録できます
          </div>
        )}
      </div>
    </div>
  );
}

// ── プレイヤー追加モーダル ──
function AddPlayerModal({ onAdd, onClose }) {
  const [name, setName] = useState("");
  const [color, setColor] = useState(PLAYER_COLORS[0]);
  const submit = () => {
    const n = name.trim(); if (!n) return;
    onAdd({ id: Date.now().toString(), name:n, color, decks:[], wants:[] });
    onClose();
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>プレイヤーを追加</h3>
        <div>
          <div className="modal-label">プレイヤー名</div>
          <input className="modal-input" placeholder="名前を入力…" value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && submit()} autoFocus />
        </div>
        <div>
          <div className="modal-label">カラー</div>
          <div className="swatches">
            {PLAYER_COLORS.map(c => (
              <div key={c} className={`swatch${color===c?" on":""}`}
                style={{ background:c, color:c }} onClick={() => setColor(c)} />
            ))}
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>キャンセル</button>
          <button className="btn primary" onClick={submit}>追加</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
function App() {
  const [tab, setTab]                   = useState("search");
  const [query, setQuery]               = useState("");
  const [selectedCard, setSelectedCard] = useState(null);
  const [players, setPlayers]           = useState([]);
  const [editMode, setEditMode]         = useState(false);
  const [showAddPlayer, setShowAddPlayer] = useState(false);
  const [toast, setToast]               = useState("");
  const [syncMode, setSyncMode]         = useState(!!SUPABASE_URL);
  const [searchMode, setSearchMode]     = useState("commander"); // "commander" | "all"
  const [apiResults, setApiResults]     = useState(null);
  const [apiLoading, setApiLoading]     = useState(false);
  const [apiTotalCards, setApiTotalCards] = useState(null);
  const inputRef   = useRef(null);
  const toastTimer = useRef(null);

  // 初期ロード
  useEffect(() => {
    (async () => {
      const pl = await remoteGet(PLAYERS_KEY);
      if (pl) setPlayers(pl.map(p => ({ wants:[], ...p })));
    })();
  }, []);

  // ポーリング（Supabase設定時のみ）
  useEffect(() => {
    if (!SUPABASE_URL) return;
    const t = setInterval(async () => {
      const pl = await remoteGet(PLAYERS_KEY);
      if (pl) setPlayers(pl.map(p => ({ wants:[], ...p })));
    }, 5000);
    return () => clearInterval(t);
  }, []);

  const savePl = useCallback(pl => remoteSet(PLAYERS_KEY, pl), []);

  const showToast = useCallback(msg => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2200);
  }, []);

  const addPlayer = useCallback(p => {
    setPlayers(prev => { const n=[...prev,p]; savePl(n); return n; });
  }, [savePl]);

  const removePlayer = useCallback(id => {
    setPlayers(prev => { const n=prev.filter(p=>p.id!==id); savePl(n); return n; });
  }, [savePl]);

  const addDeck = useCallback((playerId, cardId, playerName) => {
    setPlayers(prev => {
      if (prev.find(p=>p.id===playerId)?.decks.includes(cardId)) return prev;
      const n = prev.map(p => p.id!==playerId ? p : { ...p, decks:[...p.decks, cardId] });
      savePl(n); return n;
    });
    showToast(`✓ ${playerName} のデッキに追加しました`);
  }, [savePl, showToast]);

  const removeDeck = useCallback((playerId, cardId) => {
    setPlayers(prev => {
      const n = prev.map(p => p.id!==playerId ? p : { ...p, decks:p.decks.filter(d=>d!==cardId) });
      savePl(n); return n;
    });
  }, [savePl]);

  const addWant = useCallback((playerId, cardId, playerName) => {
    setPlayers(prev => {
      if (prev.find(p=>p.id===playerId)?.wants?.includes(cardId)) return prev;
      const n = prev.map(p => p.id!==playerId ? p : { ...p, wants:[...(p.wants||[]), cardId] });
      savePl(n); return n;
    });
    showToast(`✓ ${playerName} の欲しいカードに追加しました`);
  }, [savePl, showToast]);

  const removeWant = useCallback((playerId, cardId) => {
    setPlayers(prev => {
      const n = prev.map(p => p.id!==playerId ? p : { ...p, wants:(p.wants||[]).filter(d=>d!==cardId) });
      savePl(n); return n;
    });
  }, [savePl]);

  // 全カードモード: 総枚数取得
  useEffect(() => {
    if (searchMode !== "all" || apiTotalCards !== null) return;
    fetch("https://api.scryfall.com/cards/search?q=*&unique=cards&page=1")
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d?.total_cards) setApiTotalCards(d.total_cards); })
      .catch(() => {});
  }, [searchMode, apiTotalCards]);

  // 全カードモード: Scryfall APIをデバウンス検索
  useEffect(() => {
    if (searchMode !== "all") return;
    const q = query.trim();
    if (!q) { setApiResults(null); setApiLoading(false); return; }
    setApiLoading(true);
    const timer = setTimeout(async () => {
      try {
        const isJa = /[\u3040-\u9FFF]/.test(q);
        const apiQ = isJa ? `lang%3Aja+${encodeURIComponent(q)}` : encodeURIComponent(q);
        const url = `https://api.scryfall.com/cards/search?q=${apiQ}&order=name&unique=cards`;
        const r = await fetch(url);
        if (!r.ok) { setApiResults([]); setApiLoading(false); return; }
        const data = await r.json();
        const cards = (data.data || []).map(c => {
          const card = {
            id: c.id, n: c.name, j: c.printed_name || "",
            t: c.type_line || "", ci: c.color_identity || [],
            p: c.power || null, th: c.toughness || null,
            r: (c.rarity || "c")[0], cat: "c"
          };
          _apiCache.set(c.id, card);
          return card;
        });
        setApiResults(cards);
      } catch(e) { setApiResults([]); }
      setApiLoading(false);
    }, 350);
    return () => clearTimeout(timer);
  }, [query, searchMode]);

  const displayCards = useMemo(() => {
    if (searchMode === "all") return apiResults;
    const q = query.trim();
    if (!q) return null;
    const ql = q.toLowerCase();
    return COMMANDERS.filter(c => c.n.toLowerCase().includes(ql) || c.j.includes(q));
  }, [query, searchMode, apiResults]);

  return (
    <>
      <style>{STYLES}</style>
      <div className="app">

        {/* TOPBAR */}
        <div className="topbar">
          <div className="logo">⬡ MTG LOOT VAULT<small>COMMANDER REGISTRY</small></div>
          <div className="main-tabs">
            <button className={`main-tab${tab==="search"?" on":""}`} onClick={() => setTab("search")}>SEARCH</button>
            <button className={`main-tab${tab==="players"?" on":""}`} onClick={() => setTab("players")}>
              統率者デッキ{players.length>0?` (${players.length})`:""}
            </button>
            <button className={`main-tab${tab==="wants"?" on":""}`} onClick={() => setTab("wants")}>
              欲しいカード{players.length>0?` (${players.length})`:""}
            </button>
          </div>
          <div className="spacer" />
        </div>

        {/* ══ SEARCH ══ */}
        {tab==="search" && (<>
          <div className="search-header">
            <div className="s-wrap">
              <span className="si">⌕</span>
              <input ref={inputRef}
                placeholder={searchMode==="commander"
                  ? `統率者名を検索… (${COMMANDERS.length.toLocaleString()} 枚対象)`
                  : "カード名を検索… (Scryfall 全カード対象)"}
                value={query} onChange={e => setQuery(e.target.value)} />
              {query && <button className="cx" onClick={() => { setQuery(""); setSelectedCard(null); setApiResults(null); inputRef.current?.focus(); }}>✕</button>}
            </div>
            <div className="mode-toggle">
              <button className={`mode-btn${searchMode==="commander"?" on":""}`}
                onClick={() => { setSearchMode("commander"); setApiResults(null); setSelectedCard(null); }}>
                統率者
              </button>
              <button className={`mode-btn${searchMode==="all"?" on":""}`}
                onClick={() => { setSearchMode("all"); setSelectedCard(null); }}>
                全カード
              </button>
            </div>
          </div>
          <div className="body-wrap">
            <div className="grid-pane">
              {apiLoading ? (
                <div className="api-loading">検索中…</div>
              ) : displayCards === null ? (
                <div className="hint">
                  <div className="hint-icon">⬡</div>
                  <div className="hint-txt">
                    {searchMode==="commander" ? <>
                      統率者名（英語または日本語）を入力して検索<br />
                      <span className="hint-num">{COMMANDERS.length.toLocaleString()} 枚</span> の統率者候補から絞り込めます
                    </> : <>
                      カード名（英語・日本語）を入力して検索<br />
                      <span className="hint-num">{apiTotalCards ? apiTotalCards.toLocaleString()+" 枚" : "Scryfall"}</span> の全カードが対象です
                    </>}<br />
                    カードをクリックすると詳細とデッキ登録が表示されます
                  </div>
                </div>
              ) : displayCards.length === 0 ? (
                <div className="no-result">該当するカードが見つかりません</div>
              ) : (<>
                <div className="result-count"><b>{displayCards.length.toLocaleString()}</b> 枚が見つかりました</div>
                <div className="card-grid">
                  {displayCards.map(card => (
                    <CardTile key={card.id} card={card}
                      selected={selectedCard?.id===card.id}
                      onClick={() => setSelectedCard(p => p?.id===card.id ? null : card)} />
                  ))}
                </div>
              </>)}
            </div>
            <DetailPane card={selectedCard} players={players}
              onAddDeck={addDeck} onAddWant={addWant} onClose={() => setSelectedCard(null)} />
          </div>
        </>)}

        {/* ══ 統率者デッキ ══ */}
        {tab==="players" && (
          <div className="players-wrap">
            <div className="players-toolbar">
              <h2>統率者デッキ</h2>
              <button className="btn primary" onClick={() => setShowAddPlayer(true)}>＋ プレイヤーを追加</button>
              {players.length > 0 && (
                <button className={`btn${editMode?" active":""}`} onClick={() => setEditMode(p=>!p)}>
                  {editMode ? "✓ 完了" : "✎ 編集"}
                </button>
              )}
              <div className="spacer" />
            </div>

            {players.length===0 ? (
              <div className="no-players-msg">
                <div className="big">⬡</div>
                <p>まだプレイヤーがいません<br />「＋ プレイヤーを追加」から登録してください<br /><span style={{ fontSize:10 }}>登録後、SEARCHタブからデッキを追加できます</span></p>
              </div>
            ) : (
              <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
                <div className="players-scroll">
                  {players.map(player => (
                    <div key={player.id} className="player-row">
                      <div className="player-info">
                        <div>
                          <div>
                            <div className="player-name-txt" style={{ color:player.color }}>{player.name}</div>
                            <div className="player-deck-count">{player.decks.length} デッキ</div>
                          </div>
                        </div>
                        {editMode && (
                          <button className="btn danger" style={{ fontSize:9, padding:"3px 10px", marginTop:8 }}
                            onClick={() => { if(confirm(`${player.name} を削除しますか？`)) removePlayer(player.id); }}>
                            削除
                          </button>
                        )}
                      </div>
                      <div className="decks-strip">
                        {player.decks.length===0 ? (
                          <div className="empty-decks">SEARCHタブからデッキを追加してください</div>
                        ) : player.decks.map(cardId => {
                          const card = cardById(cardId);
                          if (!card) return null;
                          return (
                            <div key={cardId} className={`deck-wrap${selectedCard?.id===cardId?" selected":""}`}
                              onClick={() => !editMode && setSelectedCard(p => p?.id===cardId ? null : card)}>
                              <CardImg id={cardId} name={card.n} size="normal" className="deck-img" />
                              {editMode && <button className="deck-rm" onClick={e => { e.stopPropagation(); removeDeck(player.id, cardId); }}>✕</button>}
                              <div className="deck-name" title={card.j||card.n}>{card.j||card.n}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                <DetailPane card={selectedCard} players={players}
                  onAddDeck={addDeck} onAddWant={addWant} onClose={() => setSelectedCard(null)} />
              </div>
            )}
          </div>
        )}

        {/* ══ 欲しいカード ══ */}
        {tab==="wants" && (
          <div className="players-wrap">
            <div className="players-toolbar">
              <h2>欲しいカード</h2>
              <button className="btn primary" onClick={() => setShowAddPlayer(true)}>＋ プレイヤーを追加</button>
              {players.length > 0 && (
                <button className={`btn${editMode?" active":""}`} onClick={() => setEditMode(p=>!p)}>
                  {editMode ? "✓ 完了" : "✎ 編集"}
                </button>
              )}
              <div className="spacer" />
            </div>

            {players.length===0 ? (
              <div className="no-players-msg">
                <div className="big">⬡</div>
                <p>まだプレイヤーがいません<br />「＋ プレイヤーを追加」から登録してください<br /><span style={{ fontSize:10 }}>登録後、SEARCHタブからカードを追加できます</span></p>
              </div>
            ) : (
              <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
                <div className="players-scroll">
                  {players.map(player => (
                    <div key={player.id} className="player-row">
                      <div className="player-info">
                        <div>
                          <div>
                            <div className="player-name-txt" style={{ color:player.color }}>{player.name}</div>
                            <div className="player-deck-count">{(player.wants||[]).length} 枚</div>
                          </div>
                        </div>
                        {editMode && (
                          <button className="btn danger" style={{ fontSize:9, padding:"3px 10px", marginTop:8 }}
                            onClick={() => { if(confirm(`${player.name} を削除しますか？`)) removePlayer(player.id); }}>
                            削除
                          </button>
                        )}
                      </div>
                      <div className="decks-strip">
                        {(player.wants||[]).length===0 ? (
                          <div className="empty-decks">SEARCHタブからカードを追加してください</div>
                        ) : (player.wants||[]).map(cardId => {
                          const card = cardById(cardId);
                          if (!card) return null;
                          return (
                            <div key={cardId} className={`deck-wrap${selectedCard?.id===cardId?" selected":""}`}
                              onClick={() => !editMode && setSelectedCard(p => p?.id===cardId ? null : card)}>
                              <CardImg id={cardId} name={card.n} size="normal" className="deck-img" />
                              {editMode && <button className="deck-rm" onClick={e => { e.stopPropagation(); removeWant(player.id, cardId); }}>✕</button>}
                              <div className="deck-name" title={card.j||card.n}>{card.j||card.n}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                <DetailPane card={selectedCard} players={players}
                  onAddDeck={addDeck} onAddWant={addWant} onClose={() => setSelectedCard(null)} />
              </div>
            )}
          </div>
        )}
      </div>

      {showAddPlayer && <AddPlayerModal onAdd={addPlayer} onClose={() => setShowAddPlayer(false)} />}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
