// ⚙️  SUPABASE 設定（マルチユーザー同期に必要）
//    Supabaseのプロジェクト作成後、以下を書き換えてください
//    未設定の場合はlocalStorageで動作します（単一ユーザーのみ）
// ════════════════════════════════════════════════════
const SUPABASE_URL = "https://cpvpowzwahhuxbhgqdtq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdnBvd3p3YWhodXhiaGdxZHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDM2MzcsImV4cCI6MjA4ODM3OTYzN30.GCdIXNCzWCWFLvjFwCLvJ4zAAd2qur6l7jP0lA5Oco0";
const STORAGE_TABLE = "mtg_vault"; // Supabaseのテーブル名

// ── ストレージ抽象化 ──
// Supabase未設定時はlocalStorageにフォールバック
async function remoteGet(key) {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${STORAGE_TABLE}?key=eq.${key}&select=value`, {
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
  });
  const rows = await res.json();
  return rows.length ? JSON.parse(rows[0].value) : null;
}

async function remoteSet(key, value) {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    localStorage.setItem(key, JSON.stringify(value));
    return;
  }
  await fetch(`${SUPABASE_URL}/rest/v1/${STORAGE_TABLE}`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
      Prefer: "resolution=merge-duplicates",
    },
    body: JSON.stringify({ key, value: JSON.stringify(value) }),
  });
}
</script>

<script type="text/babel">
const { useState, useMemo, useRef, useEffect, useCallback } = React;


const COLOR_LBL = { W:"白", U:"青", B:"黒", R:"赤", G:"緑" };
const COLOR_BG  = { W:"#ddd090", U:"#5a9abf", B:"#9880c8", R:"#d06030", G:"#50a060" };

  "#ffffff","#c0c0c0","#888888","#404040","#1a1a1a",
];

const CARD_CACHE_KEY = "cmd-card-cache-v1";
const _apiCache = new Map((() => { try { return JSON.parse(localStorage.getItem(CARD_CACHE_KEY) || "[]"); } catch(e) { return []; } })());
let _cacheSyncTimer = null;
function _cachePut(id, card) {
  _apiCache.set(id, card);
  try { localStorage.setItem(CARD_CACHE_KEY, JSON.stringify([..._apiCache])); } catch(e) {}
  // Supabase へデバウンス同期（3秒後にまとめて保存）
  if (SUPABASE_URL) {
    clearTimeout(_cacheSyncTimer);
    _cacheSyncTimer = setTimeout(() => remoteSet(CARD_CACHE_KEY, [..._apiCache]), 3000);
  }
}
function cardById(id) { return _apiCache.get(id); }

// ── 画像URL ──
function imgUrl(id, size="normal", face="front") {
  return `https://cards.scryfall.io/${size}/${face}/${id[0]}/${id[1]}/${id}.jpg`;
}

// ── 日本語画像UUID 遅延取得（localStorageキャッシュ付き） ──
const _JA_LS = "mtg-ja-img-v4";
const _jaCache = (() => {
  const m = new Map();
  try {
    Object.entries(JSON.parse(localStorage.getItem(_JA_LS)||"{}")).forEach(([k,v]) => {
      if (v) m.set(k, v); // false エントリは読み込まない（再試行させる）
    });
  } catch(e){}
  return m;
})();
// false エントリが残っていれば localStorage からも削除（既存ユーザー向け一回限りの修正）
try {
  const stored = JSON.parse(localStorage.getItem(_JA_LS)||"{}");
  let changed = false;
  for (const k of Object.keys(stored)) { if (!stored[k]) { delete stored[k]; changed = true; } }
  if (changed) localStorage.setItem(_JA_LS, JSON.stringify(stored));
} catch(e) {}

const _jaQueue = []; // {id, name, cbs:[resolve...]}
let _jaTimer = null;
let _jaSyncTimer = null;
function _saveJa(id, val) {
  if (!val) return; // false は保存しない（次回起動時に再試行）
  _jaCache.set(id, val);
  try { const s=JSON.parse(localStorage.getItem(_JA_LS)||"{}"); s[id]=val; localStorage.setItem(_JA_LS,JSON.stringify(s)); } catch(e){}
  if (SUPABASE_URL) {
    clearTimeout(_jaSyncTimer);
    _jaSyncTimer = setTimeout(() => remoteSet(_JA_LS, Object.fromEntries(_jaCache)), 3000);
  }
}
function _runJaQueue() {
  if (!_jaQueue.length) { _jaTimer=null; return; }
  const item = _jaQueue[0];
  const _cachedJaId = _jaCache.get(item.id);
  if (_cachedJaId) { // false は fast-path しない（再試行させる）
    _jaQueue.shift(); item.cbs.forEach(cb=>cb(_cachedJaId));
    _jaTimer = setTimeout(_runJaQueue, 0); return;
  }
  (async () => {
    let v = false;
    try {
      const searchName = item.name.includes(' // ') ? item.name.split(' // ')[0] : item.name;
      const r1 = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(searchName)}`);
      const c1 = r1.ok ? await r1.json() : null;
      if (c1?.oracle_id) {
        const r2 = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(`oracleid:${c1.oracle_id} lang:ja`)}&order=released&dir=desc&unique=prints`);
        const d2 = r2.ok ? await r2.json() : null;
        // 日本語名を持つプリントを探す（DFCの場合 card_faces[0].printed_name をフォールバック）
        const hasJaName = c => /[\u3000-\u9FFF\u30A0-\u30FF\u3040-\u309F]/.test(c?.printed_name||c?.card_faces?.[0]?.printed_name||"");
        const getJaName = c => c?.printed_name || c?.card_faces?.[0]?.printed_name || "";
        const jaCard = d2?.data?.find(hasJaName) || d2?.data?.[0];
        v = jaCard?.id || false;
        // 日本語名が未保存のキャッシュエントリがあれば自動補完
        const jaName0 = getJaName(jaCard);
        if (jaName0 && _apiCache.has(item.id)) {
          const cached = _apiCache.get(item.id);
          if (!cached.j) _cachePut(item.id, { ...cached, j: jaName0 });
        }
        // 確定結果のみ保存（oracle_id が取れた場合）
        _saveJa(item.id, v);
      }
      // oracle_id 取得失敗（ネットワークエラー等）は保存しない → 次回再試行
    } catch(e) {
      // ネットワークエラー時は false を保存しない → 次回再試行
    } finally {
      _jaQueue.shift();
      item.cbs.forEach(cb => cb(v));
      _jaTimer = setTimeout(_runJaQueue, 250);
    }
  })();
}
function fetchJaId(id, name) {
  const cached = _jaCache.get(id);
  if (cached) return Promise.resolve(cached); // UUID がある場合のみ fast-path（false は無視してキューへ）
  return new Promise(resolve => {
    const ex = _jaQueue.find(q=>q.id===id);
    if (ex) { ex.cbs.push(resolve); return; }
    _jaQueue.push({id, name, cbs:[resolve]});
    if (!_jaTimer) _runJaQueue();
  });
}

// ── ドラッグスクロールストリップ ──
function DragStrip({ className, children }) {
  const ref = useRef(null);
  const dragMoved = useRef(false);
  const onMouseDown = e => {
    const el = ref.current; if (!el) return;
    const startX = e.pageX, startScroll = el.scrollLeft;
    let moved = false;
    dragMoved.current = false;
    el.classList.add("dragging");
    const onMove = ev => { const dx = ev.pageX - startX; if (Math.abs(dx) > 3) moved = true; el.scrollLeft = startScroll - dx; };
    const onUp = () => { el.classList.remove("dragging"); dragMoved.current = moved; document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };
  return <div ref={ref} className={className} onMouseDown={onMouseDown}>{children}</div>;
}

// ── 画像コンポーネント（ブラウザ環境では直接URLが使える）──
function CardImg({ id, name, size="normal", className, style, onClick }) {
  const [err, setErr] = useState(false);
  const [displayId, setDisplayId] = useState(() => name ? (_jaCache.get(id) || id) : id);
  useEffect(() => {
    setErr(false);
    if (!name) { setDisplayId(id); return; }
    const cached = _jaCache.get(id);
    if (cached !== undefined) { setDisplayId(cached || id); return; }
    setDisplayId(id);
    fetchJaId(id, name).then(jaId => setDisplayId(jaId || id));
  }, [id, name]);
  if (err) return <div className={className} style={{ display:"flex",alignItems:"center",justifyContent:"center",color:"var(--dim)",fontSize:22,...style }} onClick={onClick}>⬡</div>;
  return <img src={imgUrl(displayId, size)} alt="" className={className} style={style}
    onClick={onClick} onError={() => setErr(true)} />;
}

// ── デッキ名（日本語優先・自律取得）──
function DeckName({ card }) {
  const [jname, setJname] = useState(card?.j || "");
  useEffect(() => {
    if (!card || jname) return;
    let alive = true;
    (async () => {
      try {
        // fetchJaId でUUIDを取得（キューで250ms間隔・rate-limit済み）
        const jaId = await fetchJaId(card.id, card.n);
        if (!alive) return;
        // _runJaQueue が _apiCache.j を更新済みか確認
        const updated = _apiCache.get(card.id);
        if (updated?.j) { setJname(updated.j); return; }
        // UUIDがあるがキャッシュヒットで名前未取得の場合、直接取得
        if (!jaId) return;
        const r = await fetch(`https://api.scryfall.com/cards/${jaId}`);
        const jc = r.ok ? await r.json() : null;
        const jaName1 = jc?.printed_name || jc?.card_faces?.[0]?.printed_name;
        if (!alive || !jaName1) return;
        const cur = _apiCache.get(card.id);
        if (cur && !cur.j) _cachePut(card.id, { ...cur, j: jaName1 });
        setJname(jaName1);
      } catch(e) {}
    })();
    return () => { alive = false; };
  }, [card?.id]);
  return jname || card?.n || "";
}

// ── カラーフィルター ──
function matchesColorFilter(card, filter) {
  if (!filter || filter.size === 0) return true;
  const co = card.co != null ? card.co : (card.ci || []); // マナコスト色。未取得時はciでフォールバック
  const isLand = (card.t || '').split('//')[0].includes('Land');
  for (const f of filter) {
    if (f === 'L' && isLand) return true;
    if (isLand) continue;
    if (f === 'C' && co.length === 0) return true;
    if (f === 'M' && co.length > 1) return true;
    if (['W','U','B','R','G'].includes(f) && co.length === 1 && co[0] === f) return true;
  }
  return false;
}

const DETAIL_DEFAULT_W = 360;
function DetailPane({ card, players, onAddDeck, onAddWant, onRemoveDeck, onRemoveWant, onToggleLoot, artCtx, onSaveArt, onClose }) {
  const [prints, setPrints] = useState([]);
  const [printIdx, setPrintIdx] = useState(0);
  const [displayId, setDisplayId] = useState(null);
  const [faceIdx, setFaceIdx] = useState(0);
  const [panelWidth, setPanelWidth] = useState(DETAIL_DEFAULT_W);
  const [lightbox, setLightbox] = useState(false);
  const thumbsRef = useRef(null);
  const dragRef = useRef({ moved: false });

  const onResizeDown = e => {
    e.preventDefault();
    const startX = e.clientX, startW = panelWidth;
    const handle = e.currentTarget;
    handle.classList.add("resizing");
    const onMove = ev => setPanelWidth(Math.max(280, Math.min(700, startW + (startX - ev.clientX))));
    const onUp = () => { handle.classList.remove("resizing"); document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };

  const onThumbsMouseDown = e => {
    const el = thumbsRef.current; if (!el) return;
    const startX = e.pageX;
    const startScroll = el.scrollLeft;
    let moved = false;
    dragRef.current.moved = false;
    el.classList.add("dragging");
    const onMove = ev => {
      const dx = ev.pageX - startX;
      if (Math.abs(dx) > 3) moved = true;
      el.scrollLeft = startScroll - dx;
    };
    const onUp = () => {
      el.classList.remove("dragging");
      dragRef.current.moved = moved;
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };

  useEffect(() => {
    if (!card) return;
    const initialId = artCtx?.artId || _jaCache.get(card.id) || card.id;
    setDisplayId(initialId);
    setPrints([]);
    setPrintIdx(0);
    setFaceIdx(0);
    let cancelled = false;
    (async () => {
      try {
        const searchName = card.n.includes(' // ') ? card.n.split(' // ')[0] : card.n;
        const r1 = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(searchName)}`);
        const c1 = r1.ok ? await r1.json() : null;
        if (!c1?.oracle_id || cancelled) return;
        const r2 = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(`oracleid:${c1.oracle_id} (lang:ja or lang:en)`)}&order=released&dir=desc&unique=prints`);
        const d2 = r2.ok ? await r2.json() : null;
        if (cancelled) return;
        const data = (d2?.data || [])
          .map(c => ({ id: c.id, set: c.set_name, lang: c.lang, dfc: Array.isArray(c.card_faces) && c.card_faces.length >= 2 }))
          .sort((a, b) => (a.lang==='ja'?0:1) - (b.lang==='ja'?0:1));
        setPrints(data);
        const idx = data.findIndex(p => p.id === initialId);
        if (idx >= 0) {
          setPrintIdx(idx);
        } else if (data.length > 0) {
          setPrintIdx(0);
          setDisplayId(data[0].id);
        }
      } catch(e) {}
    })();
    return () => { cancelled = true; };
  }, [card?.id]);

  const goTo = (idx) => { setPrintIdx(idx); setDisplayId(prints[idx].id); setFaceIdx(0); };
  const prev = () => goTo((printIdx - 1 + prints.length) % prints.length);
  const next = () => goTo((printIdx + 1) % prints.length);

  if (!card) return <div className="detail-pane hidden" />;
  const paneStyle = { width: panelWidth, minWidth: panelWidth };

  const curId = displayId || _jaCache.get(card.id) || card.id;
  const multi = prints.length > 1;
  const isDfc = prints[printIdx]?.dfc;

  return (
    <div className="detail-pane" style={paneStyle}>
      <div className="detail-resize" onMouseDown={onResizeDown} />
      <div className="detail-inner">
        <button className="detail-close" onClick={onClose}>✕ 閉じる</button>
        <div className="print-wrap">
          <div className="print-img-wrap">
            {faceIdx === 1
              ? <img src={imgUrl(curId, "normal", "back")} alt="" className="detail-img" onClick={() => setLightbox(true)} />
              : <CardImg id={curId} size="normal" className="detail-img" onClick={() => setLightbox(true)} />}
            {isDfc && (
              <button className="face-flip-btn" onClick={() => setFaceIdx(f => 1 - f)}>
                {faceIdx === 0 ? "↺ 裏面" : "↺ 表面"}
              </button>
            )}
            {multi && <>
              <button className="print-nav l" onClick={prev}>‹</button>
              <button className="print-nav r" onClick={next}>›</button>
              <div className="print-counter">{printIdx + 1} / {prints.length}　{prints[printIdx].lang.toUpperCase()}{isDfc ? (faceIdx===0?" / 表":"/ 裏") : ""}</div>
            </>}
          </div>
        </div>
        {multi && (
          <div className="print-thumbs wrap" ref={thumbsRef}>
            {prints.map((p, i) => {
              const isSelected = i === printIdx;
              const thumbFace = isSelected && faceIdx === 1 && p.dfc ? "back" : "front";
              return (
                <div key={p.id} style={{ position:"relative", flexShrink:0 }}>
                  <img src={imgUrl(p.id, "small", thumbFace)} alt="" draggable={false}
                    className={`print-thumb${isSelected?" on":""}`}
                    onClick={() => { if (!dragRef.current.moved) goTo(i); }}
                    onError={e => { e.target.style.display="none"; }} />
                  {p.dfc && <span style={{ position:"absolute",bottom:2,right:2,fontSize:7,background:"rgba(0,0,0,.7)",color:"rgba(255,255,255,.8)",borderRadius:2,padding:"0 2px",lineHeight:"12px",pointerEvents:"none" }}>↺</span>}
                </div>
              );
            })}
          </div>
        )}
        {artCtx && (() => {
          const isDirty = curId !== artCtx.artId;
          return (
            <button
              className={`btn${isDirty ? " primary" : ""}`}
              style={{ opacity:isDirty?1:0.4, cursor:isDirty?"pointer":"default", alignSelf:"stretch" }}
              disabled={!isDirty}
              onClick={() => onSaveArt(artCtx.playerId, artCtx.cardId, curId)}>
              イラストを変更
            </button>
          );
        })()}
        <div className="detail-name">{card.n}</div>
        {card.j && <div className="detail-jp">{card.j}</div>}
        {players.length > 0 ? (
          <div className="reg-cols">
            <div className="reg-col">
              <div className="section-label">統率者デッキ</div>
              {players.map(p => {
                const has = p.decks.includes(card.id);
                return (
                  <button key={p.id}
                    className={`player-reg-btn${has?" has":""}`}
                    style={{ borderColor:p.color, color:p.color, background:has?`${p.color}15`:"none" }}
                    onClick={() => has ? onRemoveDeck(p.id, card.id) : onAddDeck(p.id, card.id, curId, p.name)}>
                    <span style={{ fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</span>
                    <span style={{ fontSize:9, opacity:.8, flexShrink:0 }}>
                      <span className="reg-icon-check">{has ? "✓" : "＋"}</span>
                      <span className="reg-icon-remove" style={{ display:"none" }}>✕</span>
                    </span>
                  </button>
                );
              })}
            </div>
            <div className="reg-col">
              <div className="section-label">欲しいカード</div>
              {players.map(p => {
                const has = (p.wants||[]).includes(card.id);
                const isLoot = has && (p.loots||[]).includes(card.id);
                return (
                  <div key={p.id} className="want-row">
                    <button
                      className={`player-reg-btn${has?" has":""}`}
                      style={{ borderColor:p.color, color:p.color, background:has?`${p.color}15`:"none" }}
                      onClick={() => has ? onRemoveWant(p.id, card.id) : onAddWant(p.id, card.id, curId, p.name)}>
                      <span style={{ fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</span>
                      <span style={{ fontSize:9, opacity:.8, flexShrink:0 }}>
                        <span className="reg-icon-check">{has ? "✓" : "＋"}</span>
                        <span className="reg-icon-remove" style={{ display:"none" }}>✕</span>
                      </span>
                    </button>
                    {has && (
                      <button
                        className={`detail-loot-btn${isLoot?" on":""}`}
                        title="loot"
                        onClick={() => onToggleLoot(p.id, card.id)}>
                        💎
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <div style={{ fontSize:10, color:"var(--dim)", textAlign:"center", lineHeight:1.8 }}>
            「統率者デッキ」タブでプレイヤーを<br />追加するとデッキ登録できます
          </div>
        )}
      </div>
      {lightbox && (
        <div className="img-lightbox" onClick={() => setLightbox(false)}>
          <img src={imgUrl(curId, "large", faceIdx===1?"back":"front")} alt=""
            onClick={e => e.stopPropagation()} />
        </div>
      )}
    </div>
  );
}

// ── 欲しいカードインポートモーダル ──
function ImportWantsModal({ players, onAddWant, onClose }) {
  const [playerId, setPlayerId] = useState(players[0]?.id || "");
  const [text, setText] = useState("");
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(null);

  const parseNames = (raw) => [...new Set(
    raw.split("\n")
      .map(l => l.trim())
      .filter(l => l)
      .map(l => l.replace(/^\d+[xX]?\s+/, "").trim())
      .filter(l => l)
  )];

  const run = async () => {
    const names = parseNames(text);
    if (!names.length || !playerId) return;
    const player = players.find(p => p.id === playerId);
    setRunning(true);
    let ok = 0, fail = 0, errors = [];
    setProgress({ done: 0, total: names.length, ok, fail, errors });
    for (let i = 0; i < names.length; i++) {
      const name = names[i];
      try {
        let card;
        for (const [, v] of _apiCache) {
          if (v.n.toLowerCase() === name.toLowerCase()) { card = v; break; }
        }
        if (!card) {
          const r = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`);
          if (!r.ok) throw new Error("not found");
          const c = await r.json();
          card = { id:c.id, n:c.name, j:c.printed_name||c.card_faces?.[0]?.printed_name||"", t:c.type_line||"", ci:c.color_identity||[], co:c.colors?.length?c.colors:(c.card_faces?.[0]?.colors||[]), p:c.power||null, th:c.toughness||null, r:(c.rarity||"c")[0], cat:"c" };
          _cachePut(c.id, card);
          await new Promise(res => setTimeout(res, 110));
        }
        onAddWant(playerId, card.id, card.id, player.name);
        ok++;
      } catch(e) {
        fail++;
        errors = [...errors, name];
      }
      setProgress({ done: i + 1, total: names.length, ok, fail, errors });
    }
    setRunning(false);
  };

  const done = progress && !running;
  return (
    <div className="modal-overlay" onClick={running ? undefined : onClose}>
      <div className="modal wide" onClick={e => e.stopPropagation()}>
        <h3>欲しいカードをインポート</h3>
        <div>
          <div className="modal-label">プレイヤー</div>
          <select className="modal-select" value={playerId} onChange={e => setPlayerId(e.target.value)} disabled={running}>
            {players.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div>
          <div className="modal-label">カードリスト（Magic Online形式）</div>
          <textarea className="modal-textarea"
            placeholder={"1 Rory Williams\n1 Adric, Mathematical Genius\n1 Flesh Duplicate"}
            value={text} onChange={e => setText(e.target.value)} disabled={running} />
        </div>
        {progress && (
          <div className="import-progress">
            <div>{running ? `取得中… ${progress.done} / ${progress.total}` : `完了: 成功 ${progress.ok} 枚 / 失敗 ${progress.fail} 枚`}</div>
            <div className="prog-bar-wrap"><div className="prog-bar" style={{ width:`${Math.round(progress.done/progress.total*100)}%` }} /></div>
            {progress.errors.length > 0 && <div className="import-errors">見つからなかったカード:<br />{progress.errors.join(", ")}</div>}
          </div>
        )}
        <div className="modal-actions">
          <button className="btn" onClick={onClose} disabled={running}>閉じる</button>
          {!done && <button className="btn primary" onClick={run} disabled={running || !text.trim() || !playerId}>
            {running ? "取得中…" : "インポート実行"}
          </button>}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
function App() {
  const [tab, setTab]                   = useState("search");
  const [query, setQuery]               = useState("");
  const [selectedCard, setSelectedCard] = useState(null);
  const [selectedArtCtx, setSelectedArtCtx] = useState(null); // {playerId,cardId,artId} | null
  const [players, setPlayers]           = useState([]);
  const [editMode, setEditMode]         = useState(false);
  const [bracketMode, setBracketMode]   = useState(false);
  const [bracketOrder, setBracketOrder] = useState(null); // { playerId: cardId[] } 編集開始時のスナップショット
  const [darkMode, setDarkMode]         = useState(true);
  const [colorFilter, setColorFilter]   = useState(new Set());
  const toggleColorFilter = key => setColorFilter(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });
  const clearColorFilter  = () => setColorFilter(new Set());

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "light");
  }, [darkMode]);
  const [showAddPlayer, setShowAddPlayer] = useState(false);
  const [showImportWants, setShowImportWants] = useState(false);
  const [lootMode, setLootMode] = useState(false);
  const [lootOrder, setLootOrder] = useState(null); // { playerId: cardId[] } 編集開始時のスナップショット
  const [editingPlayer, setEditingPlayer] = useState(null); // player object | null
  const [toast, setToast]               = useState("");
  const [syncMode, setSyncMode]         = useState(!!SUPABASE_URL);
  const [searchMode, setSearchMode]     = useState("commander"); // "commander" | "all"
  const [apiResults, setApiResults]     = useState(null);
  const [apiLoading, setApiLoading]     = useState(false);
  const [apiTotalCards, setApiTotalCards] = useState(null);
  const [cmdTotalCards, setCmdTotalCards] = useState(null);
  const inputRef   = useRef(null);
  const toastTimer = useRef(null);

  // 初期ロード
  useEffect(() => {
    (async () => {
      // Supabase のキャッシュをローカルにマージ
      if (SUPABASE_URL) {
        const [remoteCache, remoteJa] = await Promise.all([
          remoteGet(CARD_CACHE_KEY),
          remoteGet(_JA_LS),
        ]);
        // カードデータキャッシュ（日本語名含む）
        if (Array.isArray(remoteCache)) {
          for (const [id, card] of remoteCache) {
            const local = _apiCache.get(id);
            if (card?.j && (!local || !local.j)) {
              _apiCache.set(id, { ...(local || {}), ...card });
              try { localStorage.setItem(CARD_CACHE_KEY, JSON.stringify([..._apiCache])); } catch(e) {}
            } else if (!local) {
              _apiCache.set(id, card);
            } else if (card?.co?.length && !local.co?.length) {
              _apiCache.set(id, { ...local, co: card.co });
              try { localStorage.setItem(CARD_CACHE_KEY, JSON.stringify([..._apiCache])); } catch(e) {}
            }
          }
        }
        // 日本語イラストIDキャッシュ（false は無視して再試行させる）
        if (remoteJa && typeof remoteJa === "object") {
          let updated = false;
          for (const [id, val] of Object.entries(remoteJa)) {
            if (val && !_jaCache.has(id)) { _jaCache.set(id, val); updated = true; }
          }
          if (updated) {
            try { localStorage.setItem(_JA_LS, JSON.stringify(Object.fromEntries(_jaCache))); } catch(e) {}
          }
        }
      }

      const pl = await remoteGet(PLAYERS_KEY);
      if (!pl) return;
      let loaded = pl.map(p => ({ wants:[], arts:{}, loots:[], ...p, loots: p.loots || p.treasures || [] }));
      setPlayers(loaded);

      // バックグラウンドでUUID正規化・coフィールド補完・未キャッシュ取得を実行
      // 対象: 未キャッシュ または co未設定 のカードのみ（処理済みはスキップ）
      const allIds = [...new Set(loaded.flatMap(p => [...(p.decks||[]), ...(p.wants||[]), ...(p.loots||[])]))];
      (async () => {
        const needsUpdate = allIds.filter(id => { const c = _apiCache.get(id); return !c || c.co == null || (c.co.length === 0 && (c.ci||[]).length > 0 && !(c.t||'').split('//')[0].includes('Land')); });
        if (!needsUpdate.length) return;
        const idMap = new Map();
        let anyChanged = false;
        for (const id of needsUpdate) {
          try {
            await new Promise(r => setTimeout(r, 110));
            const r1 = await fetch(`https://api.scryfall.com/cards/${id}`);
            if (!r1.ok) { idMap.set(id, id); continue; }
            const c = await r1.json();
            let canonicalId = id, enCard = c;
            const jaName = c.printed_name || c.card_faces?.[0]?.printed_name || "";
            if (c.lang !== "en") {
              await new Promise(r => setTimeout(r, 110));
              const r2 = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(c.name)}`);
              if (r2.ok) { enCard = await r2.json(); canonicalId = enCard.id; if (canonicalId !== id) anyChanged = true; }
            }
            const existingJ = _apiCache.get(id)?.j || _apiCache.get(canonicalId)?.j || "";
            _cachePut(canonicalId, { id:canonicalId, n:enCard.name, j:jaName || existingJ, t:enCard.type_line||"", ci:enCard.color_identity||[], co:enCard.colors?.length?enCard.colors:(enCard.card_faces?.[0]?.colors||[]), p:enCard.power||null, th:enCard.toughness||null, r:(enCard.rarity||"c")[0], cat:"c" });
            idMap.set(id, canonicalId);
          } catch(e) { idMap.set(id, id); }
        }
        if (anyChanged) {
          setPlayers(prev => {
            const next = prev.map(p => ({
              ...p,
              decks: [...new Set((p.decks||[]).map(id => idMap.get(id)||id))],
              wants: [...new Set((p.wants||[]).map(id => idMap.get(id)||id))],
              loots: [...new Set((p.loots||[]).map(id => idMap.get(id)||id))],
              arts:  Object.fromEntries(Object.entries(p.arts||{}).map(([k,v]) => [idMap.get(k)||k, v])),
            }));
            remoteSet(PLAYERS_KEY, next);
            return next;
          });
        }
      })();

      // 日本語名が空のカードを補完（非同期・バックグラウンド）
      for (const id of allIds) {
        const cached = _apiCache.get(id);
        if (!cached || cached.j) continue;
        if (!_jaCache.has(id)) {
          // UUID未取得 → fetchJaId キュー経由（APIから日本語UUIDと名前を取得）
          fetchJaId(id, cached.n).then(() => setPlayers(prev => [...prev]));
        } else {
          const jaId = _jaCache.get(id);
          if (jaId) {
            // UUID取得済み・名前未取得 → 日本語カードを直接取得して名前を補完
            fetch(`https://api.scryfall.com/cards/${jaId}`)
              .then(r => r.ok ? r.json() : null)
              .then(jc => {
                const jaName2 = jc?.printed_name || jc?.card_faces?.[0]?.printed_name;
                if (jaName2) {
                  const cur = _apiCache.get(id);
                  if (cur && !cur.j) _cachePut(id, { ...cur, j: jaName2 });
                }
                setPlayers(prev => [...prev]);
              })
              .catch(() => {});
          }
        }
      }


      setPlayers(prev => [...prev]); // 再レンダリングして表示更新
    })();
  }, []);

  // ポーリング（Supabase設定時のみ）
  useEffect(() => {
    if (!SUPABASE_URL) return;
    const t = setInterval(async () => {
      const pl = await remoteGet(PLAYERS_KEY);
      if (pl) setPlayers(pl.map(p => ({ wants:[], arts:{}, loots:[], ...p, loots: p.loots || p.treasures || [] })));
    }, 5000);
    return () => clearInterval(t);
  }, []);

  const savePl = useCallback(pl => remoteSet(PLAYERS_KEY, pl), []);

  const showToast = useCallback(msg => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2200);
  }, []);

  const addPlayer = useCallback(p => {
    setPlayers(prev => { const n=[...prev,p]; savePl(n); return n; });
  }, [savePl]);

  const updatePlayer = useCallback((id, name, color) => {
    setPlayers(prev => {
      const n = prev.map(p => p.id !== id ? p : { ...p, name, color });
      savePl(n); return n;
    });
    showToast("✓ プレイヤー情報を更新しました");
  }, [savePl, showToast]);

  const removePlayer = useCallback(id => {
    setPlayers(prev => { const n=prev.filter(p=>p.id!==id); savePl(n); return n; });
  }, [savePl]);

  const addDeck = useCallback((playerId, cardId, artId, playerName) => {
    setPlayers(prev => {
      if (prev.find(p=>p.id===playerId)?.decks.includes(cardId)) return prev;
      const n = prev.map(p => p.id!==playerId ? p : { ...p, decks:[...p.decks, cardId], arts:{...(p.arts||{}), [cardId]:artId} });
      savePl(n); return n;
    });
    showToast(`✓ ${playerName} のデッキに追加しました`);
  }, [savePl, showToast]);

  const removeDeck = useCallback((playerId, cardId) => {
    setPlayers(prev => {
      const n = prev.map(p => p.id!==playerId ? p : { ...p, decks:p.decks.filter(d=>d!==cardId) });
      savePl(n); return n;
    });
  }, [savePl]);

  const setBracket = useCallback((playerId, cardId, bracket) => {
    setPlayers(prev => {
      const n = prev.map(p => {
        if (p.id !== playerId) return p;
        const brackets = { ...(p.brackets || {}) };
        if (bracket == null) delete brackets[cardId];
        else brackets[cardId] = bracket;
        return { ...p, brackets };
      });
      savePl(n); return n;
    });
  }, [savePl]);

  const addWant = useCallback((playerId, cardId, artId, playerName) => {
    setPlayers(prev => {
      if (prev.find(p=>p.id===playerId)?.wants?.includes(cardId)) return prev;
      const n = prev.map(p => p.id!==playerId ? p : { ...p, wants:[...(p.wants||[]), cardId], arts:{...(p.arts||{}), [cardId]:artId} });
      savePl(n); return n;
    });
    showToast(`✓ ${playerName} の欲しいカードに追加しました`);
    // カード名（日本語）・イラストIDをAPIで最新化
    const card = cardById(cardId);
    if (card) {
      fetchJaId(cardId, card.n).then(jaId => {
        // fetchJaId 内で _apiCache.j と _jaCache が自動更新・Supabase同期される
        if (jaId && !card.j) setPlayers(prev => [...prev]);
      });
    }
  }, [savePl, showToast]);

  const removeWant = useCallback((playerId, cardId) => {
    setPlayers(prev => {
      const n = prev.map(p => p.id!==playerId ? p : { ...p, wants:(p.wants||[]).filter(d=>d!==cardId) });
      savePl(n); return n;
    });
  }, [savePl]);

  const toggleLoot = useCallback((playerId, cardId) => {
    setPlayers(prev => {
      const n = prev.map(p => {
        if (p.id !== playerId) return p;
        const ts = p.loots || [];
        const next = ts.includes(cardId) ? ts.filter(d=>d!==cardId) : [...ts, cardId];
        return { ...p, loots: next };
      });
      savePl(n); return n;
    });
  }, [savePl]);

  const saveArt = useCallback((playerId, cardId, artId) => {
    setPlayers(prev => {
      const n = prev.map(p => p.id!==playerId ? p : { ...p, arts:{...(p.arts||{}), [cardId]:artId} });
      savePl(n); return n;
    });
    setSelectedArtCtx(ctx => ctx ? { ...ctx, artId } : null);
    showToast("✓ イラストを保存しました");
  }, [savePl, showToast]);

  const closeDetail = useCallback(() => { setSelectedCard(null); setSelectedArtCtx(null); }, []);

  // 統率者モード: 総枚数取得
  useEffect(() => {
    if (cmdTotalCards !== null) return;
    fetch("https://api.scryfall.com/cards/search?q=is%3Acommander&unique=cards&page=1")
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d?.total_cards) setCmdTotalCards(d.total_cards); })
      .catch(() => {});
  }, [cmdTotalCards]);

  // 全カードモード: 総枚数取得
  useEffect(() => {
    if (searchMode !== "all" || apiTotalCards !== null) return;
    fetch("https://api.scryfall.com/cards/search?q=*&unique=cards&page=1")
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d?.total_cards) setApiTotalCards(d.total_cards); })
      .catch(() => {});
  }, [searchMode, apiTotalCards]);

  // 統率者・全カード共通: Scryfall APIをデバウンス検索
  useEffect(() => {
    const q = query.trim();
    if (!q) { setApiResults(null); setApiLoading(false); return; }
    setApiLoading(true);
    const timer = setTimeout(async () => {
      try {
        const isJa = /[\u3040-\u9FFF]/.test(q);
        const enQ = encodeURIComponent(q);
        const jaQ = `lang%3Aja+${encodeURIComponent(q)}`;
        const base = "https://api.scryfall.com/cards/search?order=name&unique=cards&q=";
        const filter = searchMode === "commander" ? "is%3Acommander+" : "";

        const [dEn, dJa] = await Promise.all([
          fetch(base + filter + enQ).then(r => r.ok ? r.json() : null).catch(() => null),
          fetch(base + filter + jaQ).then(r => r.ok ? r.json() : null).catch(() => null),
        ]);

        // 英語名 → 英語カード（正規ID取得用）
        const enMap = {};
        for (const c of (dEn?.data || [])) enMap[c.name] = c;

        // 英語名 → 日本語名マップ
        const jaMap = {};
        for (const c of (dJa?.data || [])) {
          const ja = c.printed_name || c.card_faces?.[0]?.printed_name;
          if (ja) jaMap[c.name] = ja;
        }

        // 日本語クエリなら日本語結果を優先表示順、英語クエリなら英語優先
        const primary = isJa ? (dJa?.data || []) : (dEn?.data || []);
        const secondary = isJa ? (dEn?.data || []) : (dJa?.data || []);
        const seen = new Set();
        const cards = [];
        for (const c of [...primary, ...secondary]) {
          if (seen.has(c.name)) continue;
          seen.add(c.name);
          // IDは常に英語版の正規IDを使用（言語別IDの重複登録を防ぐ）
          const canonicalId = enMap[c.name]?.id || c.id;
          const card = {
            id: canonicalId, n: c.name,
            j: jaMap[c.name] || c.printed_name || c.card_faces?.[0]?.printed_name || "",
            t: c.type_line || "", ci: c.color_identity || [], co: c.colors?.length?c.colors:(c.card_faces?.[0]?.colors||[]),
            p: c.power || null, th: c.toughness || null,
            r: (c.rarity || "c")[0], cat: "c"
          };
          _cachePut(canonicalId, card);
          cards.push(card);
        }
        setApiResults(cards.length ? cards : []);
      } catch(e) { setApiResults([]); }
      setApiLoading(false);
    }, 350);
    return () => clearTimeout(timer);
  }, [query, searchMode]);

  const displayCards = apiResults;

  return (
    <>
      <style>{STYLES}</style>
      <div className="app">

        {/* TOPBAR */}
        <div className="topbar">
          <div className="logo">⬡ MTG LOOT VAULT<small>COMMANDER REGISTRY<span className="ver">v{APP_VERSION}</span></small></div>
          <div className="main-tabs">
            <button className={`main-tab${tab==="search"?" on":""}`} onClick={() => setTab("search")}>SEARCH</button>
            <button className={`main-tab${tab==="players"?" on":""}`} onClick={() => setTab("players")}>
              統率者デッキ{players.length>0?` (${players.length})`:""}
            </button>
            <button className={`main-tab${tab==="wants"?" on":""}`} onClick={() => setTab("wants")}>
              欲しいカード{players.length>0?` (${players.length})`:""}
            </button>
          </div>
          <div className="spacer" />
          <button className="theme-btn" onClick={() => setDarkMode(p => !p)} title={darkMode ? "ライトモードに切り替え" : "ダークモードに切り替え"}>
            {darkMode ? "☀" : "☾"}
          </button>
        </div>

        {/* ══ SEARCH ══ */}
        {tab==="search" && (<>
          <div className="search-header">
            <div className="s-wrap">
              <span className="si">⌕</span>
              <input ref={inputRef}
                placeholder={searchMode==="commander"
                  ? `統率者名を検索… (${cmdTotalCards ? cmdTotalCards.toLocaleString()+" 枚対象" : "読み込み中…"})`
                  : `カード名を検索… (${apiTotalCards ? apiTotalCards.toLocaleString()+" 枚対象" : "読み込み中…"})`}
                value={query} onChange={e => setQuery(e.target.value)} />
              {query && <button className="cx" onClick={() => { setQuery(""); setSelectedCard(null); setApiResults(null); inputRef.current?.focus(); }}>✕</button>}
            </div>
            <div className="mode-toggle">
              <button className={`mode-btn${searchMode==="commander"?" on":""}`}
                onClick={() => { setSearchMode("commander"); setApiResults(null); setSelectedCard(null); }}>
                統率者
              </button>
              <button className={`mode-btn${searchMode==="all"?" on":""}`}
                onClick={() => { setSearchMode("all"); setSelectedCard(null); }}>
                全カード
              </button>
            </div>
          </div>
          <div className="body-wrap">
            <div className="grid-pane">
              {apiLoading ? (
                <div className="api-loading">検索中…</div>
              ) : displayCards === null ? (
                <div className="hint">
                  <div className="hint-icon">⬡</div>
                  <div className="hint-txt">
                    {searchMode==="commander" ? <>
                      統率者名（英語または日本語）を入力して検索<br />
                      <span className="hint-num">{cmdTotalCards ? cmdTotalCards.toLocaleString()+" 枚" : "…"}</span> の統率者が対象です
                    </> : <>
                      カード名（英語・日本語）を入力して検索<br />
                      <span className="hint-num">{apiTotalCards ? apiTotalCards.toLocaleString()+" 枚" : "…"}</span> の全カードが対象です
                    </>}<br />
                    カードをクリックすると詳細とデッキ登録が表示されます
                  </div>
                </div>
              ) : displayCards.length === 0 ? (
                <div className="no-result">該当するカードが見つかりません</div>
              ) : (<>
                <div className="result-count"><b>{displayCards.length.toLocaleString()}</b> 枚が見つかりました</div>
                <div className="card-grid">
                  {displayCards.map(card => (
                    <CardTile key={card.id} card={card}
                      selected={selectedCard?.id===card.id}
                      onClick={() => setSelectedCard(p => p?.id===card.id ? null : card)} />
                  ))}
                </div>
              </>)}
            </div>
            <DetailPane card={selectedCard} players={players}
              onAddDeck={addDeck} onAddWant={addWant} onRemoveDeck={removeDeck} onRemoveWant={removeWant} onToggleLoot={toggleLoot} artCtx={null} onSaveArt={saveArt} onClose={closeDetail} />
          </div>
        </>)}

        {/* ══ 統率者デッキ ══ */}
        {tab==="players" && (
          <div className="players-wrap">
            <div className="players-toolbar">
              <h2>統率者デッキ</h2>
              <button className="btn primary" onClick={() => setShowAddPlayer(true)}>＋ プレイヤーを追加</button>
              {players.length > 0 && (<>
                <div className="decks-toolbar-break" />
                <button className={`btn primary${bracketMode?" active":""}`} onClick={() => {
                  if (!bracketMode) {
                    const order = {};
                    players.forEach(p => {
                      order[p.id] = [...p.decks].sort((a,b) => {
                        const ba = p.brackets?.[a]||6, bb = p.brackets?.[b]||6;
                        if (ba!==bb) return ba-bb;
                        return p.decks.indexOf(a)-p.decks.indexOf(b);
                      });
                    });
                    setBracketOrder(order);
                    setBracketMode(true);
                    setEditMode(false);
                  } else {
                    setBracketMode(false);
                    setBracketOrder(null);
                  }
                }}>
                  {bracketMode ? "✓ 完了" : "⊞ ブラケット"}
                </button>
                <button className={`btn danger${editMode?" active":""}`} onClick={() => { setEditMode(p=>!p); setBracketMode(false); setBracketOrder(null); }}>
                  {editMode ? "✓ 完了" : "✕ 削除"}
                </button>
              </>)}
              <div className="spacer" />
            </div>
            {players.length > 0 && <ColorFilterBar filter={colorFilter} onToggle={toggleColorFilter} onClear={clearColorFilter} />}

            {players.length===0 ? (
              <div className="no-players-msg">
                <div className="big">⬡</div>
                <p>まだプレイヤーがいません<br />「＋ プレイヤーを追加」から登録してください<br /><span style={{ fontSize:10 }}>登録後、SEARCHタブからデッキを追加できます</span></p>
              </div>
            ) : (
              <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
                <div className="players-scroll">
                  {players.map(player => (
                    <div key={player.id} className="player-row">
                      <div className="player-info">
                        <div>
                          <div>
                            <div className="player-name-txt" style={{ color:player.color, cursor:"pointer", textDecoration:"underline dotted", textUnderlineOffset:3 }}
                              onClick={() => setEditingPlayer(player)}>{player.name}</div>
                            <div className="player-deck-count">{player.decks.length} デッキ</div>
                          </div>
                        </div>
                        {editMode && (
                          <button className="btn danger" style={{ fontSize:9, padding:"3px 10px", marginTop:8 }}
                            onClick={() => { if(confirm(`${player.name} を削除しますか？`)) removePlayer(player.id); }}>
                            削除
                          </button>
                        )}
                      </div>
                      <div className="decks-strip">
                        {player.decks.length===0 ? (
                          <div className="empty-decks">SEARCHタブからデッキを追加してください</div>
                        ) : (bracketMode && bracketOrder?.[player.id]
                            ? bracketOrder[player.id].filter(id => player.decks.includes(id))
                            : [...player.decks].sort((a,b) => {
                                const ba=player.brackets?.[a]||6, bb=player.brackets?.[b]||6;
                                if (ba!==bb) return ba-bb;
                                return player.decks.indexOf(a)-player.decks.indexOf(b);
                              })
                            ).filter(cardId => matchesColorFilter(cardById(cardId), colorFilter))
                            .map(cardId => {
                          const card = cardById(cardId);
                          if (!card) return null;
                          const br = player.brackets?.[cardId];
                          return (
                            <div key={cardId} className={`deck-wrap${selectedCard?.id===cardId&&selectedArtCtx?.playerId===player.id?" selected":""}`}
                              onClick={() => { if(editMode||bracketMode) return; const sel=selectedCard?.id===cardId&&selectedArtCtx?.playerId===player.id; setSelectedCard(sel?null:card); setSelectedArtCtx(sel?null:{playerId:player.id,cardId,artId:player.arts?.[cardId]||_jaCache.get(cardId)||cardId}); }}>
                              <CardImg id={player.arts?.[cardId] || cardId} size="normal" className="deck-img"
                                style={!bracketMode&&!br?{filter:"brightness(.6)"}:undefined} />
                              {!bracketMode && !br && <div className="deck-construction" />}
                              {editMode && <button className="deck-rm" onClick={e => { e.stopPropagation(); removeDeck(player.id, cardId); }}>✕</button>}
                              {!bracketMode && !br && <div className="deck-construction-label"><span>【作成中】</span></div>}
                              {!bracketMode && br && (
                                <div className={`deck-bracket-badge b${br}`}>B{br}</div>
                              )}
                              <div className="deck-name"><DeckName card={card} /></div>
                              {bracketMode && (
                                <div className="deck-brackets-row" onClick={e => e.stopPropagation()}>
                                  {[1,2,3,4,5].map(b => (
                                    <button key={b} className={`deck-bracket-btn b${b}${br===b?" on":""}`}
                                      onClick={() => setBracket(player.id, cardId, br===b ? null : b)}>{b}</button>
                                  ))}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
                <DetailPane card={selectedCard} players={players}
                  onAddDeck={addDeck} onAddWant={addWant} onRemoveDeck={removeDeck} onRemoveWant={removeWant} onToggleLoot={toggleLoot} artCtx={selectedArtCtx} onSaveArt={saveArt} onClose={closeDetail} />
              </div>
            )}
          </div>
        )}

        {/* ══ 欲しいカード ══ */}
        {tab==="wants" && (
          <div className="players-wrap">
            <div className="players-toolbar">
              <h2>欲しいカード</h2>
              <button className="btn primary" onClick={() => setShowAddPlayer(true)}>＋ プレイヤーを追加</button>
              {players.length > 0 && (<>
                <div className="wants-toolbar-break" />
                <button className="btn primary" onClick={() => setShowImportWants(true)}>⇩ インポート</button>
                <button className={`btn primary${lootMode?" active":""}`} onClick={() => {
                  if (!lootMode) {
                    const order = {};
                    players.forEach(p => {
                      const ts = p.loots||[];
                      order[p.id] = [...(p.wants||[])].sort((a,b) => ts.includes(a)&&!ts.includes(b)?-1:!ts.includes(a)&&ts.includes(b)?1:0);
                    });
                    setLootOrder(order);
                    setLootMode(true);
                    setEditMode(false);
                  } else {
                    setLootMode(false);
                    setLootOrder(null);
                  }
                }}>
                  {lootMode ? "✓ 完了" : "💎 おたから"}
                </button>
                <button className={`btn danger${editMode?" active":""}`} onClick={() => { setEditMode(p=>!p); setLootMode(false); setLootOrder(null); }}>
                  {editMode ? "✓ 完了" : "✕ 削除"}
                </button>
              </>)}
              <div className="spacer" />
            </div>
            {players.length > 0 && <ColorFilterBar filter={colorFilter} onToggle={toggleColorFilter} onClear={clearColorFilter} />}

            {players.length===0 ? (
              <div className="no-players-msg">
                <div className="big">⬡</div>
                <p>まだプレイヤーがいません<br />「＋ プレイヤーを追加」から登録してください<br /><span style={{ fontSize:10 }}>登録後、SEARCHタブからカードを追加できます</span></p>
              </div>
            ) : (
              <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
                <div className="players-scroll">
                  {players.map(player => (
                    <div key={player.id} className="player-row">
                      <div className="player-info">
                        <div>
                          <div>
                            <div className="player-name-txt" style={{ color:player.color, cursor:"pointer", textDecoration:"underline dotted", textUnderlineOffset:3 }}
                              onClick={() => setEditingPlayer(player)}>{player.name}</div>
                            <div className="player-deck-count">{(player.wants||[]).length} 枚</div>
                          </div>
                        </div>
                        {editMode && (
                          <button className="btn danger" style={{ fontSize:9, padding:"3px 10px", marginTop:8 }}
                            onClick={() => { if(confirm(`${player.name} を削除しますか？`)) removePlayer(player.id); }}>
                            削除
                          </button>
                        )}
                      </div>
                      <DragStrip className="decks-strip">
                        {(player.wants||[]).length===0 ? (
                          <div className="empty-decks">SEARCHタブからカードを追加してください</div>
                        ) : (() => {
                          const ts = player.loots||[];
                          const sorted = lootMode && lootOrder?.[player.id]
                            ? lootOrder[player.id].filter(id => (player.wants||[]).includes(id))
                            : [...(player.wants||[])].sort((a,b) => ts.includes(a)&&!ts.includes(b)?-1:!ts.includes(a)&&ts.includes(b)?1:0);
                          return sorted.filter(cardId => matchesColorFilter(cardById(cardId), colorFilter)).map(cardId => {
                            const card = cardById(cardId);
                            if (!card) return null;
                            const isLoot = ts.includes(cardId);
                            return (
                              <div key={cardId}
                                className={`deck-wrap${selectedCard?.id===cardId&&selectedArtCtx?.playerId===player.id?" selected":""}${lootMode?" loot-edit-mode":""}`}
                                onClick={() => {
                                  if (editMode) return;
                                  if (lootMode) { toggleLoot(player.id, cardId); return; }
                                  const sel=selectedCard?.id===cardId&&selectedArtCtx?.playerId===player.id;
                                  setSelectedCard(sel?null:card);
                                  setSelectedArtCtx(sel?null:{playerId:player.id,cardId,artId:player.arts?.[cardId]||_jaCache.get(cardId)||cardId});
                                }}>
                                <CardImg id={player.arts?.[cardId] || cardId} size="normal"
                                  className="deck-img" style={lootMode&&!isLoot?{filter:"grayscale(1)",opacity:.45}:undefined} />
                                {editMode && <button className="deck-rm" onClick={e => { e.stopPropagation(); removeWant(player.id, cardId); }}>✕</button>}
                                {isLoot && <div className="loot-badge">💎</div>}
                                <div className="deck-name"><DeckName card={card} /></div>
                              </div>
                            );
                          });
                        })()}
                      </DragStrip>
                    </div>
                  ))}
                </div>
                <DetailPane card={selectedCard} players={players}
                  onAddDeck={addDeck} onAddWant={addWant} onRemoveDeck={removeDeck} onRemoveWant={removeWant} onToggleLoot={toggleLoot} artCtx={selectedArtCtx} onSaveArt={saveArt} onClose={closeDetail} />
              </div>
            )}
          </div>
        )}
      </div>

      {showAddPlayer && <AddPlayerModal onAdd={addPlayer} onClose={() => setShowAddPlayer(false)} />}
      {editingPlayer && <EditPlayerModal player={editingPlayer} onSave={updatePlayer} onClose={() => setEditingPlayer(null)} />}
      {showImportWants && <ImportWantsModal players={players} onAddWant={addWant} onClose={() => setShowImportWants(false)} />}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
